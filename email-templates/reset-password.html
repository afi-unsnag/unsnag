<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset your password</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700&family=DM+Sans:wght@400;500&display=swap');
  </style>
  <style>
    /* Dark mode support */
    :root {
      color-scheme: light dark;
      supported-color-schemes: light dark;
    }

    @media (prefers-color-scheme: dark) {
      /* Force background colors */
      .email-body { background-color: #1a1a1a !important; }
      .email-card { background-color: #2D2A26 !important; border-color: #4A4640 !important; box-shadow: 3px 3px 0px 0px #4A4640 !important; }

      /* Force text colors */
      .email-heading { color: #FAF7F2 !important; }
      .email-body-text { color: #E8E3DB !important; }
      .email-muted { color: #B8B2A8 !important; }
      .email-footer { color: #B8B2A8 !important; }
      .email-logo { color: #FAF7F2 !important; }

      /* CTA button stays the same - mauve is fine on dark */
      .email-cta-td { background-color: #E2C6FD !important; border-color: #C9A4E8 !important; box-shadow: 3px 3px 0px 0px #C9A4E8 !important; }
      .email-cta-link { color: #2D2A26 !important; }
    }

    /* Outlook dark mode */
    [data-ogsc] .email-body { background-color: #1a1a1a !important; }
    [data-ogsc] .email-card { background-color: #2D2A26 !important; }
    [data-ogsc] .email-heading { color: #FAF7F2 !important; }
    [data-ogsc] .email-body-text { color: #E8E3DB !important; }
    [data-ogsc] .email-muted { color: #B8B2A8 !important; }
    [data-ogsc] .email-logo { color: #FAF7F2 !important; }
  </style>
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
</head>
<body class="email-body" style="margin: 0; padding: 0; background-color: #FAF7F2; font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" class="email-body" style="background-color: #FAF7F2;">
    <tr>
      <td align="center" style="padding: 40px 20px;">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="max-width: 480px; width: 100%;">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom: 8px;">
              <h1 class="email-logo" style="margin: 0; font-family: 'Bricolage Grotesque', Georgia, serif; font-size: 36px; font-weight: 700; color: #2D2A26; letter-spacing: -0.5px;">
                unsnag
              </h1>
            </td>
          </tr>

          <!-- Accent line -->
          <tr>
            <td align="center" style="padding-bottom: 32px;">
              <div style="width: 48px; height: 4px; background-color: #E2C6FD; border-radius: 2px;"></div>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" class="email-card" style="background-color: #FFFFFF; border: 3px solid #2D2A26; border-radius: 12px; box-shadow: 3px 3px 0px 0px #2D2A26;">
                <tr>
                  <td style="padding: 36px 32px;">

                    <p class="email-heading" style="margin: 0 0 16px; font-family: 'Bricolage Grotesque', Georgia, serif; font-size: 22px; font-weight: 600; color: #2D2A26;">
                      Reset your password
                    </p>

                    <p class="email-body-text" style="margin: 0 0 24px; font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 15px; line-height: 1.6; color: #4A4640;">
                      We got a request to reset your password. Tap the button below to choose a new one.
                    </p>

                    <!-- CTA Button -->
                    <table role="presentation" cellpadding="0" cellspacing="0" style="margin: 0 auto 24px;">
                      <tr>
                        <td align="center" class="email-cta-td" style="border-radius: 12px; background-color: #E2C6FD; border: 3px solid #2D2A26; box-shadow: 3px 3px 0px 0px #C9A4E8;">
                          <a href="{{ .ConfirmationURL }}" target="_blank" class="email-cta-link" style="display: inline-block; padding: 14px 32px; font-family: 'Bricolage Grotesque', Georgia, serif; font-size: 16px; font-weight: 600; color: #2D2A26; text-decoration: none;">
                            Reset password
                          </a>
                        </td>
                      </tr>
                    </table>

                    <p class="email-muted" style="margin: 0; font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 13px; line-height: 1.5; color: #B8B2A8;">
                      If you didn't request this, no worries — just ignore this email and your password stays the same.
                    </p>

                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top: 28px;">
              <p class="email-footer" style="margin: 0; font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 12px; color: #B8B2A8;">
                Unsnag · A guided app for getting out of your own head
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
